<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>no</title>
</head>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    #canvasContainer {
        position: absolute;
        width: 50%;
        height: calc(100% - 0px);
        top: 0;
        left: 0;
    }

    #canvasContainer img {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        object-fit: contain;
        scale: 0.899;
    }

    #main {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    #playControls {
        position: absolute;
        width: 100%;
        height: 30px;
        bottom: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #playControls .controlButton {
        width: 20px;
        height: 20px;
        background: rgba(255, 255, 255, 0.8);
        padding: 5px;
        border-radius: 5px;
        color: white;
        font-size: 14px;
        margin-right: 20px;
        cursor: pointer;
    }

    .a {
        position: absolute;
        width: 100%;
        height: 100%;
        top: -2px;
        left: 0px;
        object-fit: contain;
        opacity: 0.5;
        scale: 0.99;
    }

    #topUtilityBtns {
        position: absolute;
        padding: 5px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.8);
        top: 10px;
        right: 10px;
        display: flex;
        flex-direction: row;
        gap: 10px;
        z-index: 5;
    }

    .utilityButton {
        padding: 5px;
        background: transparent;
        border: #838383 1px solid;
        box-sizing: border-box;
        color: white;
        width: 42px;
        height: 30px;
        text-align: center;
        font-size: 12px;
        border-radius: 5px;
        word-break: keep-all;
        cursor: pointer;
        overflow: hidden;
    }

    .editor-container {
        position: absolute;
        bottom: 30px;
        left: 50%;
        width: 50%;
        height: calc(100% - 30px);
        background: #1e1e1e;
        /* 背景深色 */
    }

    .editor-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 5px;
        box-sizing: border-box;
        font-family: 'Consolas', monospace;
        /* 必須用等寬字型 */
        font-size: 14px;
        line-height: 1.5;
        white-space: break-spaces;
        word-wrap: break-word;
        border: none;
        outline: none;
        overflow: auto;
        scrollbar-width: thin;
        /* auto or thin */
        scrollbar-color: #838383 transparent;
        /* 滾動條顏色 */
    }

    #editor-input {
        background: transparent;
        color: transparent;
        /* 文字透明，我們看底層的字 */
        caret-color: #ffffff;
        /* 但要讓閃爍游標看得見 */
        resize: none;
        z-index: 2;
    }

    #highlight-layer {
        user-select: none;
        pointer-events: none;
        color: #d4d4d4;
        /* 預設文字顏色 */
        z-index: 1;
        speak: none;
    }
</style>

<body>
    <!-- <img src="./image.png" alt="refimg" class="a"> -->
    <div id="canvasContainer">
        <img src="./Skin/outline.png" alt="">
        <canvas id="main"></canvas>
    </div>
    <div id="playControls">
        <div class="controlButton" data-buttonAction="play/stop" data-playing="false"></div>
        <input type="range" id="timeControl" min="0" max="1" value="0" step="0.01">
    </div>
    <div class="editor-container">
        <div id="highlight-layer" class="editor-layer" inert aria-disabled="true" aria-hidden="true"
            contenteditable="false"></div>
        <textarea id="editor-input" class="editor-layer" spellcheck="false"></textarea>
    </div>
    <div id="topUtilityBtns">
        <div class="utilityButton" data-buttonAction="popup">彈出</div>
        <div class="utilityButton" data-buttonAction="quickGenerate">快速生成</div>
        <div class="utilityButton" data-buttonAction="hideEditor">隱藏編輯器</div>
    </div>
</body>
<script type="module">
    import { getImg, imgNotExists, PathRecorder, scaleBase, innerCirleBase, noteRefPos, touchRefPos, getButton, debounce } from './helper.js';
    import { simaiDecode } from './decode.js';

    const
        canvas = document.getElementById('main'),
        canvasContainer = document.getElementById('canvasContainer');
    const slider = document.getElementById('timeControl');
    const playButton = getButton("play/stop", "control");
    const quickGenerateButton = getButton("quickGenerate", "utility");
    const hideEditorButton = getButton("hideEditor", "utility");
    const popup = getButton("popup", "utility");

    let ctx = canvas.getContext('2d');
    const scale = 0.99;
    const noteBaseSize = 11;
    const speed = 7;
    const touchSpeed = 7;
    const effectDecayTime = 0.4;
    const distance = 0.25;
    let globalTime = 0;
    let lastTimestamp = null;
    let secondCtx = null;
    let externalWindow = null;

    const editorContainer = document.querySelector('.editor-container');
    const editorInput = document.getElementById('editor-input');
    const highlightLayer = document.getElementById('highlight-layer');
    let notes = [], endTime = 1;

    const savedContent = localStorage.getItem('simai_editor_content');
    const getres = ((simaiDataValue) => {
        const result = (() => {
            try {
                return simaiDecode(simaiDataValue);
            } catch (e) {
                console.error("解析失敗", e);
                return null;
            }
        })();

        if (result) {
            notes = result.notes;
            endTime = result.endTime;
            slider.max = endTime + 1;
            draw();
        }
    })

    const inputDebounce = debounce(() => {
        const value = editorInput.value;

        // 解析 Note 邏輯
        getres(value);

        // 存入本地空間
        localStorage.setItem('simai_editor_content', value);
    }, 300);

    const setEditorCss = (visible = null) => {
        // 同步捲動永遠執行
        highlightLayer.scrollTop = editorInput.scrollTop;
        highlightLayer.scrollLeft = editorInput.scrollLeft;

        if (visible === null) return;

        // visible 為 true 代表顯示編輯器
        canvasContainer.style.width = visible ? '50%' : '100%';
        const displayMode = visible ? 'block' : 'none';

        editorInput.style.display = displayMode;
        highlightLayer.style.display = displayMode;
        editorContainer.style.display = displayMode;
    };

    editorInput.addEventListener('input', () => {
        const value = editorInput.value;

        // 同步捲動位置
        setEditorCss();

        // 立即更新顏色高亮 (視覺上達到打字立刻出現)
        applyHighlight(value);

        // 延遲處理重解析與存檔 (避免打字時解析幾萬行導致卡頓)
        inputDebounce();
    });

    hideEditorButton.addEventListener('click', () => {
        // 檢查目前是否為隱藏狀態
        const currentlyHidden = editorContainer.style.display === 'none';

        // 如果目前隱藏 -> 點擊後要「顯示」(true)
        // 如果目前顯示 -> 點擊後要「隱藏」(false)
        const nextStateVisible = currentlyHidden;

        // 儲存的是 "是否隱藏" 的狀態
        localStorage.setItem('hide_editor', !nextStateVisible);

        setEditorCss(nextStateVisible);
        resize();
    });

    quickGenerateButton.addEventListener('click', () => {
        const sampleData = `(60){4},`;
        editorInput.value += sampleData;
        applyHighlight(editorInput.value);
        inputDebounce();
    });

    editorInput.addEventListener('scroll', () => {
        highlightLayer.scrollTop = editorInput.scrollTop;
        highlightLayer.scrollLeft = editorInput.scrollLeft;
    });

    function applyHighlight(text) {
        if (!text) {
            highlightLayer.innerHTML = "";
            return;
        }

        // 1. HTML 轉義
        let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // 2. 語法正則表達式 (已經包含註解優先匹配邏輯)
        const combinedRegex = /(\|\|.*$)|((?:pp)|(?:qq)|[-^vpqszVw]|(?:&lt;)|(?:&gt;))|(\([^()]*\))|(\{[^{}]*\})|(\[[^[\]]*\])|(\,)|(h)|(f)|(b)|(([ABCDE])(\d+)|C|C(d+))/gm;

        html = html.replace(combinedRegex, (match, comment, slide, bpm, split, time, comm, hold, f, bk, touch) => {
            if (comment) return `<span style="color: #468A55;">${comment}</span>`;
            if (slide) return `<span style="color: #7EBAF0;">${slide}</span>`;
            if (touch) return `<span style="color: #7EBAF0;">${touch}</span>`;
            if (bpm) return `<span style="color: #F7CC6F; font-weight: bold;">${bpm}</span>`;
            if (split) return `<span style="color: #ce9178;">${split}</span>`;
            if (time) return `<span style="color: #b5cea8;">${time}</span>`;
            if (bk) return `<span style="color: #F7B268;">${bk}</span>`;
            if (hold) return `<span style="color: #9DC284;">${hold}</span>`;
            if (f) return `<span style="color: #FC7CC6;">${f}</span>`;
            if (comm) return `<span style="color: #99A9AD;">${comm}</span>`;
            return match;
        });

        // 解決最後一行換行高度不對齊問題
        highlightLayer.innerHTML = html + (text.endsWith('\n') ? ' ' : '');
    }
    const baseURL = './Skin/';
    const images = {
        tap: await getImg(baseURL + 'tap.png'),
        tap_break: await getImg(baseURL + 'tap_break.png'),
        tap_each: await getImg(baseURL + 'tap_each.png'),
        hold: await getImg(baseURL + 'hold.png'),
        hold_break: await getImg(baseURL + 'hold_break.png'),
        hold_each: await getImg(baseURL + 'hold_each.png'),
        touch: await getImg(baseURL + 'touch.png'),
        touch_each: await getImg(baseURL + 'touch_each.png'),
        touch_point: await getImg(baseURL + 'touch_point.png'),
        touch_point_each: await getImg(baseURL + 'touch_point_each.png'),
        star: await getImg(baseURL + 'star.png'),
        star_break: await getImg(baseURL + 'star_break.png'),
        star_each: await getImg(baseURL + 'star_each.png'),
        star_double: await getImg(baseURL + 'star_double.png'),
        star_break_double: await getImg(baseURL + 'star_break_double.png'),
        star_each_double: await getImg(baseURL + 'star_each_double.png'),
        slide: await getImg(baseURL + 'slide.png'),
        slide_each: await getImg(baseURL + 'slide_each.png'),
        slide_break: await getImg(baseURL + 'slide_break.png'),
        touchhold_0: await getImg(baseURL + 'touchhold_0.png'),
        touchhold_1: await getImg(baseURL + 'touchhold_1.png'),
        touchhold_2: await getImg(baseURL + 'touchhold_2.png'),
        touchhold_3: await getImg(baseURL + 'touchhold_3.png'),
        touchhold_border: await getImg(baseURL + 'touchhold_border.png'),
    };

    if (savedContent) {
        editorInput.value = savedContent;

        const isVisible = localStorage.getItem('hide_editor') !== 'true'; // 改名為 isVisible 較直覺
        setEditorCss(isVisible);

        applyHighlight(savedContent);
        getres(savedContent);

        resize();
    }

    slider.addEventListener('input', () => {
        const value = parseFloat(slider.value);
        globalTime = value;
        if (playButton.dataset.playing === 'false') {
            draw();
        }
    });

    playButton.addEventListener('click', () => {
        if (playButton.dataset.playing === 'true') {
            playButton.dataset.playing = 'false';
            lastTimestamp = null;
        } else {
            playButton.dataset.playing = 'true';
            lastTimestamp = performance.now();
            requestAnimationFrame(update);
        }
    });

    function update(timestamp) {
        if (lastTimestamp === null) lastTimestamp = timestamp;
        const dt = (timestamp - lastTimestamp) / 1000; // 秒
        lastTimestamp = timestamp;
        if (playButton.dataset.playing === 'true') {
            globalTime += dt;
            slider.value = globalTime;
            draw();
            if (globalTime >= endTime) {
                playButton.dataset.playing = 'false';
                globalTime = endTime;
                slider.value = globalTime;
            } else {
                requestAnimationFrame(update);
            }
        }
    }

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = canvasContainer.clientWidth * dpr;
        const h = canvasContainer.clientHeight * dpr;
        const p = Math.min(w, h) / scaleBase * scale;
        canvas.width = w;
        canvas.height = h;
        ctx.setTransform(p, 0, 0, p, w / 2, h / 2);
        draw();
    }

    function scaleCanvasContainer() {

    }

    popup.addEventListener('click', openSecondWindow);

    function openSecondWindow() {
        if (externalWindow && !externalWindow.closed) {
            externalWindow.focus();
            return;
        }
        externalWindow = window.open("", "SecondaryCanvas", "width=800,height=800");
        // 注入基礎樣式與 Canvas
        const style = externalWindow.document.createElement('style');
        style.textContent = `
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            #canvasContainer {
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
            }
            #canvasContainer img {
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                object-fit: contain;
                scale: 0.899;
            }
            #secondary {
                position: absolute;
                top: 0;
                left: 0;
            }
        `;
        externalWindow.document.head.appendChild(style);
        externalWindow.document.body.innerHTML = `
            <div id="canvasContainer">
                <img src="./Skin/outline.png" alt="">
                <canvas id="secondary"></canvas>
            </div>
        `;
        const extCanvas = externalWindow.document.getElementById('secondary');
        // 這裡需要處理縮放邏輯，建議參考你原有的 resize 函式
        extCanvas.width = 800;
        extCanvas.height = 800;
        secondCtx = extCanvas.getContext('2d');

        externalWindow.addEventListener('beforeunload', () => {
            console.log("警告：外部視窗即將關閉");
            // 你可以在這裡重置主視窗的某些狀態
            secondCtx = null;
            ctx = canvas.getContext('2d'); // 切回主 Canvas 的上下文
        });

        const syncResize = () => {
            const dpr = externalWindow.devicePixelRatio || 1;
            const size = Math.min(externalWindow.innerWidth, externalWindow.innerHeight);
            extCanvas.width = externalWindow.innerWidth * dpr;
            extCanvas.height = externalWindow.innerHeight * dpr;

            // 重新套用你的座標系統 (這點最重要！)
            const p = size / scaleBase * scale * dpr;
            secondCtx.setTransform(p, 0, 0, p, extCanvas.width / 2, extCanvas.height / 2);
        };

        syncResize();

        externalWindow.addEventListener('resize', syncResize);
        ctx.clearRect(-canvas.width, -canvas.height, canvas.width * 2, canvas.height * 2); // 清除主 Canvas

        ctx = secondCtx; // 切換到第二個 Canvas 的上下文

        draw(); // 重新繪製到第二個 Canvas
    }

    window.addEventListener('resize', resize);

    resize();

    function draw() {
        ctx.clearRect(-canvas.width, -canvas.height, canvas.width * 2, canvas.height * 2);
        ctx.strokeStyle = '#0000ff50';
        ctx.lineWidth = 0.2;
        ctx.beginPath();
        ctx.arc(0, 0, 50, 0, Math.PI * 2);
        ctx.stroke();
        for (let i = notes.length - 1; i >= 0; i--) {
            const note = notes[i];
            if (note.type === 'tap') {
                if (note.isStar) drawStar(note);
                else drawTap(note);
            }
            if (note.type === 'hold') {
                drawHold(note);
            }
            if (note.type === 'touch') {
                drawTouch(note);
            }
            if (note.type === 'slide') {
                drawSlide(note);
            }
            continue;
        }
    }
    function simpleEndEffect(t) {
        const decayAlpha = 1 - Math.max(0, - t / effectDecayTime);
        const radius = 0.8 * noteBaseSize * (1 - decayAlpha);

        ctx.strokeStyle = `rgba(255, 200, 0, ${0.8 * decayAlpha})`;
        ctx.lineWidth = 0.5 * noteBaseSize * decayAlpha;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.stroke();
    }
    function drawTap(s) {
        const { time: noteTime, pos, isBreak, isDouble } = s;
        const noteT = (noteTime - globalTime);
        const progress = noteT * speed;
        const t = 1 - timeFunction(progress);

        if (t < -0.8 || -noteT > effectDecayTime) return;

        const img = images[isBreak ? "tap_break" : (isDouble ? "tap_each" : "tap")];
        if (imgNotExists(img)) return;

        const posInfo = noteRefPos[pos - 1];
        ctx.save();

        if (t >= 1) {
            ctx.translate(posInfo.x, posInfo.y);
            simpleEndEffect(noteT);
        }
        else {
            const displayT = Math.max(distance, t);
            const currentScale = t < distance ? (t + 0.9) / (0.9 + distance) : 1;
            const size = noteBaseSize * currentScale;

            ctx.translate(posInfo.x * displayT, posInfo.y * displayT);
            /*ctx.font = `3px Arial`;
            ctx.fillText(t, 10, 10);*/
            ctx.rotate(posInfo.rot);
            ctx.drawImage(img, -size / 2, -size / 2, size, size);
        }
        ctx.restore();
    }
    function drawStar(s) {
        const { time: noteTime, pos, isBreak, isDouble, isMultiple } = s;
        const noteT = (noteTime - globalTime);
        const progress = noteT * speed;
        const t = 1 - timeFunction(progress);

        if (t < -0.8 || -noteT > effectDecayTime) return;

        const img = images[isMultiple ? (isBreak ? "star_break_double" : (isDouble ? "star_each_double" : "star_double"))
            : (isBreak ? "star_break" : (isDouble ? "star_each" : "star"))
        ];
        if (imgNotExists(img)) return;

        const posInfo = noteRefPos[pos - 1];
        ctx.save();

        if (t >= 1) {
            ctx.translate(posInfo.x, posInfo.y);
            simpleEndEffect(noteT);
        }
        else {
            const displayT = Math.max(distance, t);
            const currentScale = t < distance ? (t + 0.9) / (0.9 + distance) : 1;
            const size = noteBaseSize * currentScale;

            ctx.translate(posInfo.x * displayT, posInfo.y * displayT);
            ctx.rotate(posInfo.rot);
            ctx.drawImage(img, -size / 2, -size / 2, size, size);
        }
        ctx.restore();
    }
    function drawHold(s) {
        const { time: noteTime, pos, isBreak, isDouble, holdDuration } = s;
        const noteT = (noteTime - globalTime);
        const progress = noteT * speed;
        const t = 1 - timeFunction(progress);

        if (t < -0.8 || -noteT > effectDecayTime + holdDuration) return;

        const img = images[isBreak ? "hold_break" : (isDouble ? "hold_each" : "hold")];
        if (imgNotExists(img)) return;
        const sizeOffset = t < distance ? 0 :
            Math.min((1 - distance) * 2.45,
                Math.min((holdDuration + noteT) * 0.9 * speed,
                    Math.min((t - distance) * 2.45,
                        holdDuration * 0.9 * speed)));

        const posInfo = noteRefPos[pos - 1];
        ctx.save();
        if (-noteT >= holdDuration) {
            ctx.translate(posInfo.x, posInfo.y);
            simpleEndEffect(holdDuration + noteT);
        }
        else {
            const displayT = Math.min(1, Math.max(distance, t));
            const currentScale = t < distance ? (t + 0.9) / (0.9 + distance) : 1;
            const size = noteBaseSize * currentScale;

            ctx.translate(posInfo.x * displayT, posInfo.y * displayT);
            ctx.rotate(posInfo.rot);
            ctx.drawImage(img, 0, 0, 122, 55, -size / 2, -size * 1.64 * 0.35, size, size * 1.64 * 0.275); // head
            ctx.drawImage(img, 0, 55, 122, 90, -size / 2, -size * 1.64 * 0.0785, size, size * 1.64 * (0.17 + sizeOffset)); // body
            ctx.drawImage(img, 0, 145, 122, 55, -size / 2, size * 1.64 * (0.09 + sizeOffset), size, size * 1.64 * 0.275); // tail
        }
        ctx.restore();
    }
    function timeFunction(x) {
        return 0.02160482279616 * x * x * x - 0.07553691072 * x * x + 0.43509924 * x + 0.000250029;
    }
    function drawTouch(s) {
        const { time: noteTime, pos, touchPos, isDouble, holdDuration } = s;
        if (holdDuration) {
            const imgs = [];
            for (let i = 0; i < 4; i++) {
                const img = images["touchhold_" + i];
                if (imgNotExists(img)) return;
                imgs.push(img);
            }
            const touchPoint = images[isDouble ? "touch_point_each" : "touch_point"];
            const touchBorder = images.touchhold_border;
            if (imgNotExists(touchPoint) || imgNotExists(touchBorder)) return;
            const noteT = (noteTime - globalTime);
            const progress = noteT * touchSpeed;
            const t = 1 - timeFunction(progress);

            if (t < -0.8 || -noteT > effectDecayTime + holdDuration) return;

            const size = noteBaseSize * (t < distance ? (t + 0.9) / (0.9 + distance) : 1);
            const posInfo = touchRefPos[touchPos][touchPos === "C" ? 0 : pos - 1];
            ctx.save();
            if (-noteT >= holdDuration) {
                ctx.translate(posInfo.x, posInfo.y);
                simpleEndEffect(holdDuration + noteT);
            }
            else {
                const currentScale = 0.8;
                const size = noteBaseSize * 0.7;
                const holdP = Math.max(0, Math.min(1, -noteT / holdDuration));

                let a = touchTimeFunction(11 * (1 - Math.min(1, t)) / 1.5) * 1.6;

                ctx.translate(posInfo.x, posInfo.y);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, size * 1.3, -Math.PI * 0.5, Math.PI * holdP * 2 - Math.PI * 0.5);
                ctx.closePath();
                ctx.clip();
                ctx.drawImage(touchBorder, -size * 1.3, -size * 1.3, size * 2.6, size * 2.6);
                ctx.restore();
                ctx.save();
                ctx.translate(posInfo.x, posInfo.y);
                ctx.rotate(Math.PI * -0.75);
                ctx.globalAlpha = Math.max(0, 1 - (1 - Math.min(1, t)) * 0.55);
                for (let i = 0; i < 4; i++) {
                    ctx.drawImage(imgs[i], -size * 1.365 * 0.5, size * 0.15 * (a - 1.5), size * 1.365, size);
                    ctx.rotate(Math.PI / 2);
                }
                ctx.globalAlpha = 1;
                ctx.drawImage(touchPoint, -size * 0.2, -size * 0.2, size * 0.4, size * 0.4);
            }
            ctx.restore();
            return;
        }
        const img = images[isDouble ? "touch_each" : "touch"];
        const touchPoint = images[isDouble ? "touch_point_each" : "touch_point"];
        if (imgNotExists(img) || imgNotExists(touchPoint)) return;
        const noteT = (noteTime - globalTime);
        const progress = noteT * touchSpeed;
        const t = 1 - timeFunction(progress);

        if (t < -0.8 || -noteT > effectDecayTime) return;

        const size = noteBaseSize * (t < distance ? (t + 0.9) / (0.9 + distance) : 1);
        const posInfo = touchRefPos[touchPos][touchPos === "C" ? 0 : pos - 1];
        ctx.save();
        if (t >= 1) {
            ctx.translate(posInfo.x, posInfo.y);
            simpleEndEffect(noteT);
        }
        else {
            const currentScale = 0.8;
            const size = noteBaseSize * 0.7;

            let a = touchTimeFunction(11 * (1 - t) / 1.5) * 1.6;

            ctx.translate(posInfo.x, posInfo.y);
            /*ctx.font = `3px Arial`;
            ctx.fillText(1 - (1 - t) / 1.4, 10, 10);*/
            //ctx.rotate(posInfo.rot);
            ctx.globalAlpha = Math.max(0, 1 - (1 - t) * 0.55);
            for (let i = 0; i < 4; i++) {
                ctx.drawImage(img, -size * 1.365 * 0.5, size * 0.15 * (a - 1.5), size * 1.365, size);
                ctx.rotate(Math.PI / 2);
            }
            ctx.globalAlpha = 1;
            ctx.drawImage(touchPoint, -size * 0.2, -size * 0.2, size * 0.4, size * 0.4);
        }
        ctx.restore();
    }
    function touchTimeFunction(x) {
        return 0.000753454 * x * x * x - 0.0298793 * x * x + 0.375038 * x + 0.104685;
    }
    function drawSlide(s) {
        const img = images[s.isBreak ? "slide_break" : (s.isDouble ? "slide_each" : "slide")];
        if (imgNotExists(img)) return;
        const { time: noteTime, pos, slideEnd, isBreak, isDouble, slideDelay, slideDuration, path } = s;

        const noteT = noteTime - globalTime;
        const progress = noteT * touchSpeed;
        const t = 1 - timeFunction(progress);

        if (t < distance || -noteT > slideDelay + slideDuration) return;

        const p = path || generatePath(pos, slideEnd);
        if (p.totalLength < 1e-4) return;
        ctx.save();

        const isTaped = -noteT > 0;
        ctx.globalAlpha = isTaped ? 1 : 0.6 * ((t - distance) / (1 - distance));
        let slideProgress = 0;
        if (-noteT > slideDelay) {
            slideProgress = Math.min(1, (-noteT - slideDelay) / slideDuration);
        }
        /*ctx.beginPath();
        //drawPathOnCanvas(ctx, p);
        ctx.closePath();
        ctx.strokeStyle = '#0000ff';
        ctx.lineWidth = 1;
        ctx.stroke();*/

        drawPathWithArrows(ctx, p, slideProgress, img);

        if (noteT <= 0 && slideProgress < 1) {
            const { x, y, rot } = p.getPointAt(slideProgress);

            ctx.globalAlpha = 0.5;
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.fillStyle = isBreak ? '#ffcc00' : '#0000ff';
            ctx.fillRect(-2.5, -2.5, 5, 5);
        }

        ctx.restore();
    }
    function drawPathWithArrows(ctx, recorder, t, img, s = { spacing: 4.36 }) {
        if (recorder.totalLength === 0) return;

        const arrowCount = Math.floor(recorder.totalLength / s.spacing);
        ctx.beginPath();
        for (let i = arrowCount - 1; i > Math.floor(t * arrowCount); i--) {
            const d = i * s.spacing;
            const t = d / recorder.totalLength;

            const { x, y, rot } = recorder.getPointAt(t);

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot + Math.PI);
            ctx.drawImage(img, -7 * 0.9 * 0.5, - 9.4 * 0.9 * 0.5, 7 * 0.9, 9.4 * 0.9);

            ctx.restore();
        }
    }
    function drawPathOnCanvas(ctx, recorder) {
        if (recorder.segments.length === 0) return;

        const start = recorder.segments[0].type === 'line'
            ? recorder.segments[0].start
            : { x: recorder.segments[0].cx + recorder.segments[0].r * Math.cos(recorder.segments[0].startAngle), y: recorder.segments[0].cy + recorder.segments[0].r * Math.sin(recorder.segments[0].startAngle) };

        ctx.moveTo(start.x, start.y);
        for (const seg of recorder.segments) {
            if (seg.type === 'line') {
                ctx.lineTo(seg.end.x, seg.end.y);
            } else if (seg.type === 'arc') {
                ctx.arc(seg.cx, seg.cy, seg.r, seg.startAngle, seg.endAngle, seg.diff < 0);
            }
        }
    }
    function generatePath(startPos, endPos) {
        console.warn("path missing, using straight line as fallback");
        const recorder = new PathRecorder();
        const startInfo = noteRefPos[startPos - 1];
        const endInfo = noteRefPos[endPos - 1];

        recorder.moveTo(startInfo.x, startInfo.y);
        recorder.lineTo(endInfo.x, endInfo.y);

        return recorder;
    }
