<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>no</title>
</head>
<style>
    :root {
        --utility-hidden-height: 16px;
        --playControls-height: 50px;
    }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #101010;
        /* 深色背景 */
    }

    #canvasContainer {
        position: absolute;
        width: 50%;
        height: calc(100% - var(--playControls-height));
        top: 0;
        left: 0;
    }

    #canvasContainer img {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        object-fit: contain;
        scale: 0.89;
    }

    #main {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    #playControls {
        position: absolute;
        width: 100%;
        height: var(--playControls-height);
        bottom: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #playControls .controlButton {
        width: 20px;
        height: 20px;
        background: rgba(255, 255, 255, 0.8);
        padding: 5px;
        border-radius: 5px;
        color: white;
        font-size: 14px;
        margin-right: 20px;
        cursor: pointer;
    }

    .a {
        position: absolute;
        width: 100%;
        height: 100%;
        top: -3px;
        left: 0px;
        object-fit: contain;
        opacity: 0.8;
        scale: 1.03;
    }

    #topUtilityBtns {
        width: calc(50% - 10px);
        height: 30px;
        position: absolute;
        padding: 5px;
        background: rgb(40, 40, 40);
        top: 0;
        right: 0;
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        gap: 5px;
        z-index: 5;
        user-select: none;
        scrollbar-width: none;
    }

    .utilityButton {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        padding: 5px;
        background: transparent;
        border: #838383 1px solid;
        box-sizing: border-box;
        color: white;
        width: 60px;
        height: 30px;
        text-align: center;
        font-size: 12px;
        border-radius: 5px;
        word-break: keep-all;
        cursor: pointer;
        overflow: hidden;
    }

    .utilityButton.noFixedsize {
        width: auto;
        padding: 5px 10px;
    }

    .utilityButton input[type="number"] {
        width: 50px;
        margin-left: 5px;
        background: transparent;
        border: none;
        border-bottom: 1px solid #838383;
        box-sizing: border-box;
        color: white;
        text-align: center;
    }

    .utilityButton input[type="checkbox"] {
        margin-left: 5px;
        width: 16px;
        height: 16px;
    }

    .utilityButton input[type="file"] {
        display: none;
    }

    .utilityButton select {
        min-width: 30px;
        margin-left: 5px;
        background: transparent;
        border: none;
        border-bottom: 1px solid #838383;
        box-sizing: border-box;
        color: white;
        text-align: center;
    }

    .utilityButton select option {
        background: #202020;
        color: white;
        border: none;
    }

    .editor-container {
        position: absolute;
        top: 40px;
        bottom: 30px;
        left: 50%;
        width: 50%;
        height: calc(100% - var(--playControls-height) - 40px);
        background: #1e1e1e;
        /* 背景深色 */
    }

    .editor-container.expanded {
        height: calc(100% - var(--playControls-height) - var(--utility-hidden-height));
    }

    .editor-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 5px;
        box-sizing: border-box;
        font-family: 'Consolas', monospace;
        /* 必須用等寬字型 */
        font-size: 14px;
        line-height: 1.5;
        white-space: break-spaces;
        word-wrap: break-word;
        border: none;
        outline: none;
        overflow: auto;
        scrollbar-width: thin;
        /* auto or thin */
        scrollbar-color: #838383 transparent;
        /* 滾動條顏色 */
    }

    #editor-input {
        background: transparent;
        color: transparent;
        /* 文字透明，我們看底層的字 */
        caret-color: #ffffff;
        /* 但要讓閃爍游標看得見 */
        resize: none;
        z-index: 2;
    }

    #highlight-layer {
        user-select: none;
        pointer-events: none;
        color: #d4d4d4;
        /* 預設文字顏色 */
        z-index: 1;
    }

    .utilityButton.expanded {
        width: 100%;
        height: 30px;
        border: none;
        padding: 0;
        height: var(--utility-hidden-height);
    }
</style>

<body>
    <!-- <img src="./image copy.png" alt="refimg" class="a"> -->
    
    <div id="canvasContainer">
        <img src="./Skin/outline.png" alt="">
        <canvas id="main"></canvas>
    </div>
    <div id="playControls">
        <div class="controlButton" data-buttonAction="play/stop" data-playing="false"></div>
        <input type="range" id="timeControl" min="0" max="1" value="0" step="0.01">
    </div>
    <div class="editor-container">
        <div id="highlight-layer" class="editor-layer" inert aria-disabled="true" aria-hidden="true"
            contenteditable="false"></div>
        <textarea id="editor-input" class="editor-layer" spellcheck="false"></textarea>
    </div>
    <div id="topUtilityBtns">
        <div class="utilityButton noFixedsize" data-buttonAction="hide/show" data-hidden="false">▲</div>
        <div class="utilityButton" data-buttonAction="hideEditor">開合編輯器</div>
        <div class="utilityButton noFixedsize" data-buttonAction="offset">偏移
            <input type="number" step="0.01" value="0" name="d">
        </div>
        <div class="utilityButton noFixedsize" data-buttonAction="changeDifficulty">難度切換
            <select name="d">
                <option value="7">ORIGINAL</option>
                <option value="6">RE:MASTER</option>
                <option value="5" selected>MASTER</option>
                <option value="4">EXPERT</option>
                <option value="3">ADVANCED</option>
                <option value="2">BASIC</option>
                <option value="1">EASY</option>
            </select>
        </div>
        <div class="utilityButton" data-buttonAction="readFolder">讀取資料夾
            <input type="file" webkitdirectory directory multiple />
        </div>
        <div class="utilityButton" data-buttonAction="addMusic">加入音樂</div>
        <div class="utilityButton" data-buttonAction="readMaidata">讀取maidata</div>
        <div class="utilityButton" data-buttonAction="quickGenerate">快速生成</div>
        <div class="utilityButton" data-buttonAction="popup">預覽彈出</div>
        <div class="utilityButton noFixedsize" data-buttonAction="readyBeat">預備拍<input type="checkbox" name="d"></div>
        <div class="utilityButton" data-buttonAction="manageResources">資源管理</div>
        <div class="utilityButton" data-buttonAction="settings">設定</div>
    </div>
</body>
<script type="module" src="indexDB.js"></script>
<script type="module" src="main.js">
</script>

</html>
