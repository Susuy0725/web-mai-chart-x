<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web maiChart -beta</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=chevron_right,keyboard_arrow_down,menu,pause,play_arrow,right_panel_close,right_panel_open,skip_previous,warning" />
    <link rel="stylesheet" href="main.css">
    <script src="jszip.min.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <!--<img src="./image copy.png" alt="refimg" class="a">-->

    <div id="canvasContainer">
        <img src="./Skin/outline.png" alt="outline" onerror="this.style.display = 'none'" id="canvasOutline">
        <canvas id="main"></canvas>
        <img src="" alt="" onerror="this.style.display='none'" id="backgroundImage">
    </div>
    <div id="playControls">
        <input type="range" id="timeControl" min="0" max="1" value="0" step="0.01">
        <div class="controlsContainer">
            <div class="controlButton" data-buttonAction="stop">
                <span class="material-symbols-outlined">
                    skip_previous
                </span>
            </div>
            <div class="controlButton" data-buttonAction="play/pause" data-playing="false">
                <span class="material-symbols-outlined">
                    play_arrow
                </span>
            </div>
            <div class="controlButton" data-buttonAction="hide" data-playing="false">
                <span class="material-symbols-outlined">
                    keyboard_arrow_down
                </span>
            </div>
        </div>
    </div>
    <div id="editorContainer">
        <div id="highlight-layer" class="editor-layer" inert aria-disabled="true" aria-hidden="true"
            contenteditable="false"></div>
        <textarea id="editor-input" class="editor-layer" spellcheck="false"></textarea>
        <canvas id="visualEditor" class="visualEditor-layer" style="display: none;"></canvas>
    </div>
    <div id="utilityContainer">
        <div id="topUtilityBtns">
            <div class="utilityButton miniButton" data-buttonAction="hideEditor"><span
                    class="material-symbols-outlined">
                    right_panel_close
                </span></div>

            <div class="utilityDropdown">
                <div class="utilityDropdown-btn utilityButton miniButton">
                    <span class="material-symbols-outlined">menu</span>
                </div>
                <div class="utilityDropdown-content">
                    <div class="utilityButton utilityMenuTitle">
                        <span>檔案</span>
                        <span class="utilityMenuArrow material-symbols-outlined">
                            chevron_right
                        </span>
                        <div class="utilitySubmenu">
                            <div class="utilityButton" data-buttonAction="createNew">新建</div>
                            <div class="utilityButton" data-buttonAction="readFolder">讀取資料夾
                                <input type="file" webkitdirectory directory multiple />
                            </div>
                            <div class="utilityButton" data-buttonAction="addMusic">加入音樂</div>
                            <div class="utilityButton" data-buttonAction="readMaidata">讀取maidata</div>
                            <div class="utilityButton" data-buttonAction="download">下載</div>
                        </div>
                    </div>
                    <div class="utilityButton utilityMenuTitle">
                        <span>編輯</span>
                        <span class="utilityMenuArrow material-symbols-outlined">
                            chevron_right
                        </span>
                        <div class="utilitySubmenu">
                            <div class="utilityButton" data-buttonAction="undo">復原</div>
                            <div class="utilityButton" data-buttonAction="redo">重作</div>
                            <div class="utilityButton" data-buttonAction="rotateClockwise">順時針旋轉</div>
                            <div class="utilityButton" data-buttonAction="rotateCounterClockwise">逆時針旋轉</div>
                            <div class="utilityButton" data-buttonAction="rotate180">180度旋轉</div>
                            <div class="utilityButton" data-buttonAction="flipVertical">上下反轉</div>
                            <div class="utilityButton" data-buttonAction="flipHorizontal">左右反轉</div>
                        </div>
                    </div>
                    <div class="utilityButton utilityMenuTitle">
                        <span>功能</span>
                        <span class="utilityMenuArrow material-symbols-outlined">
                            chevron_right
                        </span>
                        <div class="utilitySubmenu">
                            <div class="utilityButton" data-buttonAction="getNowNoteIndex">游標移至播放頭</div>
                            <div class="utilityButton" data-buttonAction="getCursorNoteIndex">播放頭移至游標</div>
                            <div class="utilityButton" data-buttonAction="editMusic">編輯音樂開頭</div>
                            <div class="utilityButton" data-buttonAction="tapBpm">Tap BPM</div>
                            <div class="utilityButton" data-buttonAction="quickGenerate">快速生成</div>
                            <div class="utilityButton" data-buttonAction="popup">預覽彈出</div>
                        </div>
                    </div>
                    <div class="utilityButton" data-buttonAction="manageResources">資源管理</div>
                    <div class="utilityButton" data-buttonAction="chartInfo">譜面資訊</div>
                    <div class="utilityButton" data-buttonAction="settings">設定</div>
                </div>
            </div>

            <div class="utilityButton noFixedsize" data-buttonAction="offset">偏移
                <input type="number" step="0.01" value="0" name="d">
            </div>
            <div class="utilityButton noFixedsize" data-buttonAction="changeDifficulty">難度切換
                <select name="d">
                    <option value="7">ORIGINAL</option>
                    <option value="6">RE:MASTER</option>
                    <option value="5" selected>MASTER</option>
                    <option value="4">EXPERT</option>
                    <option value="3">ADVANCED</option>
                    <option value="2">BASIC</option>
                    <option value="1">EASY</option>
                </select>
            </div>

            <div class="utilityButton noFixedsize" data-buttonAction="readyBeat">預備拍<input type="checkbox" name="d">
            </div>
            <div class="utilityButton noFixedsize" data-buttonAction="displayMode">顯示模式
                <select name="d">
                    <option value="simai">simai 語法</option>
                    <option value="visual">軌道</option>
                </select>
            </div>
        </div>
        <div class="closeBtn" data-hidden="false">▲</div>
        <div class="warnbtn"><span class="material-symbols-outlined">warning</span><span class="warnCount">0</span>
        </div>
    </div>
</body>
<script type="module" src="indexDB.js"></script>
<script type="module" src="main.js">
</script>

</html>
